<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | ระบบงานกิจกรรมพัฒนานักศึกษาคณะวิทยาศาสตร์</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" href="{{ url_for('static', filename='images/sci_atomic.png') }}" type="image/png">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">

                <div class="card shadow-lg rounded-4 p-4 login-card">

                    <div class="text-center mb-4">
                        <img src="{{ url_for('static', filename='images/sci_atomic.png') }}" alt="Logo"
                            width="100" class="img-fluid mb-3">
                        <h4 class="fw-semibold mb-1 system-title">
                            ระบบงานกิจกรรมพัฒนานักศึกษา
                        </h4>
                        <small class="text-muted">
                            คณะวิทยาศาสตร์
                        </small>
                    </div>

                    <form onsubmit="login(event)">

                        <div class="mb-3">
                            <label class="form-label">ชื่อผู้ใช้งานอีเมล/รหัสนักศึกษา</label>
                            <input type="text" id="username" class="form-control"
                                placeholder="Username" required>
                        </div>

                        <div class="mb-4 position-relative">
                            <label class="form-label">รหัสผ่าน</label>
                            <input type="password" id="password"
                                class="form-control pe-5"
                                placeholder="Password" required>

                            <i class="bi bi-eye-slash password-toggle"
                                onclick="togglePassword()"></i>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2">
                            <i class="bi bi-box-arrow-in-right me-2"></i>
                            เข้าสู่ระบบ
                        </button>

                        <div id="message" class="mt-3 text-center"></div>

                    </form>

                    <div class="text-center mt-4">
                        <small>
                            ยังไม่ลงทะเบียน?
                            <a href="#" class="text-decoration-none">
                                ลงทะเบียนที่นี่
                            </a>
                        </small>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/login.js')}}"></script>

</body>
</html>
